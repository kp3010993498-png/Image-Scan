{% extends 'base.html' %}

{% block title %}Playlist: {{ playlist.name }}{% endblock %}

{% block content %}
<div class="card">
    <h2>{{ playlist.name }}</h2>
    {% if is_scheduled_time %}
    <div style="padding: 10px; background: #d4edda; border: 1px solid #28a745; border-radius: 4px; margin-bottom: 10px;">
        <strong>✓ Scheduled time - Auto-playing now</strong>
    </div>
    {% endif %}
    <div id="player-area">
        <div id="player-header" class="player-header"></div>
        <div id="media-container"></div>
    </div>
</div>

<script>
const mediaList = {{ media|tojson }};
const isScheduledTime = {{ 'true' if is_scheduled_time else 'false' }};
let index = 0;
const container = document.getElementById('media-container');
const header = document.getElementById('player-header');

function updateHeader() {
    if (mediaList.length === 0) {
        header.textContent = 'No media available.';
        return;
    }
    header.textContent = `Playing item ${index + 1} of ${mediaList.length}`;
}

function playNext() {
    container.innerHTML = '';
    if (index >= mediaList.length) {
        header.textContent = 'Playlist complete.';
        return;
    }
    updateHeader();
    const m = mediaList[index];
    if (m.type === 'image') {
        const img = document.createElement('img');
        img.src = m.url;
        img.className = 'media-full';
        container.appendChild(img);
        setTimeout(() => { index++; playNext(); }, 6000);
    } else if (m.type === 'video') {
        const v = document.createElement('video');
        v.src = m.url;
        v.controls = true;
        v.autoplay = true;
        v.muted = true;
        v.playsInline = true;
        v.className = 'media-full';
        v.onended = () => { index++; playNext(); };
        v.onplay = () => {
            if (isScheduledTime) {
                setTimeout(() => { v.muted = false; }, 500);
            }
        };
        container.appendChild(v);
        setTimeout(() => {
            v.play().catch(() => {
                if (isScheduledTime) {
                    header.textContent = 'Auto-play blocked. Tap play to continue.';
                } else {
                    header.textContent = 'Tap play to start video.';
                }
            });
        }, 100);
    } else if (m.type === 'audio') {
        const a = document.createElement('audio');
        a.src = m.url;
        a.controls = true;
        a.autoplay = true;
        a.muted = true;
        a.className = 'media-full';
        a.onended = () => { index++; playNext(); };
        a.onplay = () => {
            if (isScheduledTime) {
                setTimeout(() => { a.muted = false; }, 500);
            }
        };
        container.appendChild(a);
        setTimeout(() => {
            a.play().catch(() => {
                if (isScheduledTime) {
                    header.textContent = 'Auto-play blocked. Tap play to continue.';
                } else {
                    header.textContent = 'Tap play to start audio.';
                }
            });
        }, 100);
    } else {
        const a = document.createElement('a');
        a.href = m.url;
        a.textContent = 'Open content';
        a.target = '_blank';
        container.appendChild(a);
    }
}

if (mediaList.length > 0) playNext();
else updateHeader();
</script>
{% endblock %}
